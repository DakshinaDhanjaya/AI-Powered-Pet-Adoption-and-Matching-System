services:
  - type: web_service
    name: petmatch-backend
    env: docker
    plan: free
    dockerfilePath: backend/Dockerfile
    buildCommand: mvn -f backend/ clean package -DskipTests=true
    startCommand: java -jar target/backend-1.0.0.jar

  - type: web_service
    name: petmatch-breedid
    env: docker
    plan: free
    dockerfilePath: ai_breed_identifier/Dockerfile

  - type: web_service
    name: petmatch-recommend
    env: docker
    plan: free
    dockerfilePath: recommendation_api/Dockerfile
